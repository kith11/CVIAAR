services:
  - type: web
    name: cviaar-admin
    env: docker
    plan: free # Change to a paid plan if you need more resources
    region: ohio # Change as needed
    dockerContext: .
    dockerfilePath: Dockerfile
    envVars:
      - key: APP_ROLE
        value: ADMIN_DASHBOARD
      - key: DATABASE_URL
        sync: false # Required: set the direct Supabase/Postgres connection string in Render
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false # Required: set a strong admin password in Render
      - key: UPSTASH_REDIS_URL
        sync: false
      - key: UPSTASH_REDIS_TOKEN
        sync: false
      - key: DEBUG
        value: false
      - key: PYTHON_VERSION
        value: 3.10.12
    healthCheckPath: /api/live-status
    # Persistent disk for SQLite and Face data
    disk:
      name: cviaar-data
      mountPath: /app/data
      sizeGB: 1
