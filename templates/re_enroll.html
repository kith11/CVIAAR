{% extends "layout.html" %}

{% block content %}
<div class="mb-5">
    <h1 class="section-title">Re-enroll User</h1>
    <p class="section-desc">Select a user to re-enroll their face data.</p>
</div>

<div class="card p-0 overflow-hidden">
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead>
                <tr>
                    <th class="ps-4">Name</th>
                    <th>Email</th>
                    <th>Staff ID</th>
                    <th class="pe-4"></th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td class="ps-4 fw-bold">{{ user.name }}</td>
                    <td>{{ user.email }}</td>
                    <td>{{ user.staff_code }}</td>
                    <td class="text-end pe-4">
                        <a href="/enroll/{{ user.id }}?re_enroll=true" class="btn btn-sm btn-primary">Re-enroll</a>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="4" class="text-center py-5 text-muted">No users found.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
