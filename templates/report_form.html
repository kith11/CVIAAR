{% extends "layout.html" %}
{% block content %}
<div class="row mt-4">
    <div class="col-md-6 offset-md-3">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4>Generate Report for {{ user.name }}</h4>
            </div>
            <div class="card-body">
                <form action="/generate_report" method="POST" target="_blank">
                    <input type="hidden" name="user_id" value="{{ user.id }}">
                    
                    <div class="mb-3">
                        <label class="form-label">Select Month</label>
                        <select name="month" class="form-select">
                            {% for m in range(1, 13) %}
                            <option value="{{ m }}" {% if m == current_month %}selected{% endif %}>{{ m }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Select Year</label>
                        <select name="year" class="form-select">
                            <option value="2025" selected>2025</option>
                            <option value="2026">2026</option>
                        </select>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-success">Generate Printable Report</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
