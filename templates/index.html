{% extends "layout.html" %}

{% block content %}
<div class="row mb-4 align-items-center">
    <div class="col-md-8">
        <h2 class="fw-bold text-dark">📷 Live Attendance Monitor</h2>
        <p class="text-muted">Real-time face recognition and attendance tracking.</p>
    </div>
    <div class="col-md-4 text-end">
        <div class="h4 mb-0" id="clock-time">--:--</div>
        <div class="small text-muted" id="clock-date">-- -- ----</div>
    </div>
</div>

<div class="row">
    <!-- Live Feed Section -->
    <div class="col-lg-8 mb-4">
        <div class="card shadow border-0 rounded-3 overflow-hidden">
            <div class="card-body p-0 bg-black text-center position-relative">
                <div class="position-relative" style="width: 100%; min-height: 480px;">
                    <video id="video" autoplay playsinline class="img-fluid" style="width: 100%; height: 100%; object-fit: contain; transform: scaleX(-1);"></video>
                    <canvas id="overlay" class="position-absolute top-0 start-0 w-100 h-100"></canvas>
                    <canvas id="capture-canvas" style="display:none;"></canvas>
                </div>
                
                <div class="position-absolute top-0 end-0 m-3">
                    <span class="badge bg-danger animate-pulse">● LIVE</span>
                </div>
                <div id="status-overlay" class="position-absolute bottom-0 start-0 w-100 p-3 bg-dark bg-opacity-75 text-white">
                    <h3 class="mb-0 fw-bold" id="status-message">Initializing Camera...</h3>
                </div>
            </div>
        </div>
    </div>

    <!-- Sidebar: Recent Activity & Actions -->
    <div class="col-lg-4">
        <!-- ... (rest of sidebar) ... -->
        <div class="card shadow-sm border-0 mb-4 h-100">
            <div class="card-header bg-white border-bottom-0 pt-3 pb-0 d-flex justify-content-between align-items-center">
                <h5 class="fw-bold mb-0">Recent Activity</h5>
                <span class="badge bg-light text-dark border">Real-time</span>
            </div>
            <div class="card-body p-0">
                <div class="list-group list-group-flush" id="recent-logs-list" style="max-height: 400px; overflow-y: auto;">
                    <!-- JS will populate this -->
                    <div class="text-center p-4 text-muted">
                        <div class="spinner-border spinner-border-sm mb-2" role="status"></div>
                        <p class="small mb-0">Loading attendance logs...</p>
                    </div>
                </div>
            </div>
            <div class="card-footer bg-light text-center border-top-0 p-3" id="manual-entry-container">
                <button class="btn btn-outline-primary w-100 py-2 fw-bold" data-bs-toggle="modal" data-bs-target="#manualEntryModal">
                    ⌨️ Enter & Verify ID
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Manual Entry Modal -->
<div class="modal fade" id="manualEntryModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header bg-primary text-white border-0">
                <h5 class="modal-title">Enter ID</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <div id="login-readout" class="display-6 fw-bold text-center mb-4 text-primary border-bottom pb-2" style="min-height: 50px;"></div>
                
                <div class="d-grid gap-2 mb-3" style="grid-template-columns: repeat(3, 1fr); display: grid;">
                    <button class="btn btn-outline-dark border-0 bg-light py-3 fs-5 rounded-3" onclick="loginAppend('1')">1</button>
                    <button class="btn btn-outline-dark border-0 bg-light py-3 fs-5 rounded-3" onclick="loginAppend('2')">2</button>
                    <button class="btn btn-outline-dark border-0 bg-light py-3 fs-5 rounded-3" onclick="loginAppend('3')">3</button>
                    <button class="btn btn-outline-dark border-0 bg-light py-3 fs-5 rounded-3" onclick="loginAppend('4')">4</button>
                    <button class="btn btn-outline-dark border-0 bg-light py-3 fs-5 rounded-3" onclick="loginAppend('5')">5</button>
                    <button class="btn btn-outline-dark border-0 bg-light py-3 fs-5 rounded-3" onclick="loginAppend('6')">6</button>
                    <button class="btn btn-outline-dark border-0 bg-light py-3 fs-5 rounded-3" onclick="loginAppend('7')">7</button>
                    <button class="btn btn-outline-dark border-0 bg-light py-3 fs-5 rounded-3" onclick="loginAppend('8')">8</button>
                    <button class="btn btn-outline-dark border-0 bg-light py-3 fs-5 rounded-3" onclick="loginAppend('9')">9</button>
                    <button class="btn btn-outline-danger border-0 bg-light py-3 fs-6 rounded-3" onclick="loginClear()">CLR</button>
                    <button class="btn btn-outline-dark border-0 bg-light py-3 fs-5 rounded-3" onclick="loginAppend('0')">0</button>
                    <button class="btn btn-outline-secondary border-0 bg-light py-3 fs-6 rounded-3" onclick="loginBack()">⌫</button>
                </div>

                <form id="login-form" action="/manual_attendance" method="POST" style="display:none;">
                    <input type="hidden" name="user_id" id="login-user-id">
                </form>
                <form id="logout-form" action="/manual_logout" method="POST" style="display:none;">
                    <input type="hidden" name="user_id" id="logout-user-id">
                </form>

                <div class="d-grid gap-2">
                    <button class="btn btn-success py-2" onclick="loginSubmit()">Log-in</button>
                    <button class="btn btn-warning py-2 text-dark" onclick="logoutSubmit()">Logout (End Shift)</button>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .animate-pulse {
        animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.5; }
        100% { opacity: 1; }
    }
    .list-group-item {
        transition: background-color 0.2s;
    }
    .list-group-item:hover {
        background-color: #f8f9fa;
    }
</style>

<script>
    // Clock
    function updateClock() {
        const now = new Date();
        document.getElementById('clock-time').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        document.getElementById('clock-date').textContent = now.toLocaleDateString([], { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Keypad Logic
    function loginReadout() { return document.getElementById('login-readout'); }
    function loginAppend(d) {
        const ro = loginReadout();
        const val = ro.textContent.trim();
        if (val.length < 12) ro.textContent = (val + d);
    }
    function loginBack() {
        const ro = loginReadout();
        const val = ro.textContent.trim();
        ro.textContent = val.slice(0, -1);
    }
    function loginClear() { loginReadout().textContent = ''; }
    function loginSubmit() {
        const val = loginReadout().textContent.trim();
        if (!val) { alert('Enter ID'); return; }
        document.getElementById('login-user-id').value = val;
        document.getElementById('login-form').submit();
    }
    function logoutSubmit() {
        const val = loginReadout().textContent.trim();
        if (!val) { alert('Enter ID'); return; }
        document.getElementById('logout-user-id').value = val;
        document.getElementById('logout-form').submit();
    }

    // Recent Logs Polling
    function fetchRecentLogs() {
        fetch('/api/recent_logs')
            .then(response => response.json())
            .then(data => {
                const list = document.getElementById('recent-logs-list');
                if (data.length === 0) {
                    list.innerHTML = '<div class="text-center p-3 text-muted">No recent activity.</div>';
                    return;
                }
                
                let html = '';
                data.forEach(log => {
                    html += `
                        <div class="list-group-item px-3 py-2 border-0 border-bottom">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="mb-0 fw-bold text-truncate" style="max-width: 150px;">${log.name}</h6>
                                    <small class="text-muted">${log.time}</small>
                                </div>
                                <span class="badge bg-${log.color} rounded-pill">${log.status}</span>
                            </div>
                        </div>
                    `;
                });
                list.innerHTML = html;
            })
            .catch(err => console.error('Error fetching logs:', err));
    }

    // Fetch immediately and then every 3 seconds
    fetchRecentLogs();
    setInterval(fetchRecentLogs, 3000);
    
    // Camera & Recognition Logic
    const video = document.getElementById('video');
    const overlayCanvas = document.getElementById('overlay');
    const overlayCtx = overlayCanvas.getContext('2d');
    const captureCanvas = document.getElementById('capture-canvas');
    const captureCtx = captureCanvas.getContext('2d');
    const statusMsg = document.getElementById('status-message');
    const statusOverlay = document.getElementById('status-overlay');

    // Start Camera
    // Only start camera if on localhost
    const isLocal = ['localhost', '127.0.0.1', '0.0.0.0'].includes(window.location.hostname);

    if (isLocal && navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } })
            .then(stream => {
                video.srcObject = stream;
                statusMsg.textContent = "Camera Active. Processing...";
                // Start processing loop
                setInterval(processFrame, 300); // ~3 FPS
            })
            .catch(err => {
                console.error("Camera error:", err);
                statusMsg.textContent = "Error: Camera access denied. Check permissions.";
                statusOverlay.className = 'position-absolute bottom-0 start-0 w-100 p-3 bg-danger text-white';
            });
    } else if (!isLocal) {
        // Remote Mode
        statusMsg.textContent = "Remote Monitoring Mode. Camera Disabled.";
        statusOverlay.className = 'position-absolute bottom-0 start-0 w-100 p-3 bg-secondary text-white';
        // Hide video element to avoid confusion
        video.style.opacity = '0.1';
        // Still fetch logs
    } else {
        statusMsg.textContent = "Error: Browser does not support camera API.";
    }

    let recognizeBusy = false;
    let lastFaces = [];
    let lastFacesTime = 0;

    function processFrame() {
        if (recognizeBusy) return;
        if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

        // Sync overlay canvas size
        overlayCanvas.width = video.videoWidth;
        overlayCanvas.height = video.videoHeight;
        
        // Capture frame
        captureCanvas.width = video.videoWidth;
        captureCanvas.height = video.videoHeight;
        captureCtx.drawImage(video, 0, 0);
        const dataURL = captureCanvas.toDataURL('image/jpeg', 0.7); 

        recognizeBusy = true;

        fetch('/api/recognize', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: dataURL })
        })
        .then(response => response.json())
        .then(data => {
            // Clear overlay
            overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            
            // Mirror context for drawing if video is mirrored
            overlayCtx.save();
            overlayCtx.scale(-1, 1);
            overlayCtx.translate(-overlayCanvas.width, 0);
            
            if (data.status === 'success' && data.faces.length > 0) {
                lastFaces = data.faces;
                lastFacesTime = Date.now();
            } else if (Date.now() - lastFacesTime < 1000 && lastFaces.length > 0) {
                data.status = 'success';
                data.faces = lastFaces;
            }

            if (data.status === 'success' && data.faces.length > 0) {
                let mainFace = data.faces[0]; 
                
                // Draw all faces
                data.faces.forEach(face => {
                    const [x, y, w, h] = face.rect;
                    
                    // Draw box
                    overlayCtx.lineWidth = 4;
                    if (face.verified) {
                        overlayCtx.strokeStyle = '#00ff00'; // Green
                    } else if (face.status === 'recognized') {
                        overlayCtx.strokeStyle = '#ffff00'; // Yellow
                    } else {
                        overlayCtx.strokeStyle = '#ff0000'; // Red
                    }
                    overlayCtx.strokeRect(x, y, w, h);
                    
                    // Draw Name
                    overlayCtx.scale(-1, 1); // Flip back for text
                    overlayCtx.font = "bold 24px Arial";
                    overlayCtx.fillStyle = overlayCtx.strokeStyle;
                    // Adjust x coordinate for flipped text
                    const textX = -(x + w); 
                    overlayCtx.fillText(face.name, -(x + w/2 + 50), y - 10); // Rough positioning
                    overlayCtx.scale(-1, 1); // Flip again for next rect
                });

                // Update Status Bar
                if (mainFace.verified) {
                    statusOverlay.className = 'position-absolute bottom-0 start-0 w-100 p-3 bg-success text-white';
                    statusMsg.innerHTML = `Verified: ${mainFace.name}. Please Enter ID to Confirm.`;
                } else if (mainFace.status === 'recognized') {
                    statusOverlay.className = 'position-absolute bottom-0 start-0 w-100 p-3 bg-warning text-dark';
                    statusMsg.innerHTML = `Hello ${mainFace.name}. Please blink to verify.`;
                } else {
                    statusOverlay.className = 'position-absolute bottom-0 start-0 w-100 p-3 bg-danger text-white';
                    statusMsg.innerHTML = 'Face Not Recognized.';
                }

            } else {
                statusOverlay.className = 'position-absolute bottom-0 start-0 w-100 p-3 bg-dark bg-opacity-75 text-white';
                statusMsg.innerHTML = 'Please stand in front of camera';
            }
            overlayCtx.restore();
        })
        .catch(err => console.error("Recognition error:", err))
        .finally(() => {
            recognizeBusy = false;
        });
    }

    // Auto-refresh page every 1 hour just to be safe with memory
    setTimeout(function() {
        window.location.reload();
    }, 60 * 60 * 1000);
</script>
{% endblock %}
