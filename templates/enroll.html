{% extends "layout.html" %}
{% block content %}
<div class="text-center">
    <h2>Enrolling: {{ user.name }}</h2>
    <p class="text-muted">Please look at the camera. We need to capture 25 face images.</p>
    
    <div class="position-relative d-inline-block">
        <video id="video" autoplay playsinline class="img-fluid border rounded" style="max-width: 640px; width: 100%; transform: scaleX(-1);"></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <div id="status-overlay" class="position-absolute top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center" style="background: rgba(0,0,0,0.5); display: none !important;">
            <div class="text-white h3">Done! Retraining...</div>
        </div>
    </div>

    <div class="mt-4" style="max-width: 640px; margin: 20px auto;">
        <h5>Progress: <span id="count">0</span>/25</h5>
        <div class="progress">
            <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
        </div>
        <div id="message" class="mt-2 text-info">Initializing Camera...</div>
    </div>
</div>

<script>
    const userId = "{{ user.id }}";
    const progressBar = document.getElementById('progress-bar');
    const countSpan = document.getElementById('count');
    const messageDiv = document.getElementById('message');
    const statusOverlay = document.getElementById('status-overlay');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const context = canvas.getContext('2d');
    
    let captured = 0;
    let isTraining = false;

    // Start Camera
    const isReEnroll = {{ 'true' if re_enroll else 'false' }};

    if (isReEnroll) {
        messageDiv.textContent = "Re-enrollment started. Resetting existing faces...";
        fetch(`/api/reset_faces/${userId}`, { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    startCamera();
                } else {
                    messageDiv.textContent = "Error resetting faces: " + data.message;
                    messageDiv.className = "mt-2 text-danger";
                }
            })
            .catch(err => {
                console.error(err);
                messageDiv.textContent = "Network Error. Please try again.";
            });
    } else {
        startCamera();
    }

    function startCamera() {
        navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } })
            .then(stream => {
                video.srcObject = stream;
                messageDiv.textContent = "Camera active. Starting capture in 2 seconds...";
                setTimeout(captureFace, 2000);
            })
            .catch(err => {
                console.error("Camera error:", err);
                messageDiv.textContent = "Error: Camera access denied or not found. Please allow camera permissions.";
                messageDiv.className = "mt-2 text-danger";
            });
    }

    function captureFace() {
        if (captured >= 25 || isTraining) return;

        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            const dataURL = canvas.toDataURL('image/jpeg');

            fetch(`/api/capture/${userId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: dataURL })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success' || data.status === 'complete') {
                    captured = data.count;
                    updateProgress();
                    
                    if (captured >= 25) {
                        startTraining();
                    } else {
                        messageDiv.textContent = "Face captured! stay still...";
                        messageDiv.className = "mt-2 text-success";
                        setTimeout(captureFace, 500); // Wait a bit before next capture
                    }
                } else if (data.status === 'no_face') {
                    messageDiv.textContent = "No face detected. Please look at the camera.";
                    messageDiv.className = "mt-2 text-warning";
                    setTimeout(captureFace, 500);
                } else {
                    messageDiv.textContent = "Error: " + data.message;
                    messageDiv.className = "mt-2 text-danger";
                    setTimeout(captureFace, 1000);
                }
            })
            .catch(err => {
                console.error(err);
                setTimeout(captureFace, 1000);
            });
        } else {
            // Video not ready yet
            setTimeout(captureFace, 100);
        }
    }

    function updateProgress() {
        const percent = (captured / 25) * 100;
        progressBar.style.width = percent + '%';
        countSpan.textContent = captured;
    }

    function startTraining() {
        if (isTraining) return;
        isTraining = true;
        messageDiv.textContent = "Images collected. Retraining model... (this may take a few seconds)";
        messageDiv.className = "mt-2 text-info fw-bold";
        statusOverlay.style.display = 'flex';
        
        fetch('/api/train')
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    messageDiv.textContent = "Model updated! Redirecting...";
                    setTimeout(() => {
                        window.location.href = '/admin';
                    }, 2000);
                } else {
                    messageDiv.textContent = "Error: " + data.message;
                    statusOverlay.style.display = 'none';
                    isTraining = false;
                }
            })
            .catch(err => {
                messageDiv.textContent = "Training failed. Check console.";
                statusOverlay.style.display = 'none';
                isTraining = false;
            });
    }
</script>
{% endblock %}
